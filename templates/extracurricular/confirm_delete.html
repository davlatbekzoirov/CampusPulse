{% extends "extracurricular/base.html" %}
{% block title %}Confirm Delete · Campus Life{% endblock %}
{% block content %}
<h1>Delete "{{ object }}"?</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, delete</button>
        <a class="btn" href="javascript:history.back()">Cancel</a>
    </form>
</div>
{% endblock %}
